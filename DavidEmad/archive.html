    <script>
        function checkInternet() {
            const onlineVideo = document.getElementById('online-video');
            const offlineVideo = document.getElementById('offline-video');

                // لو في نت: شغل Wistia واخفي الـ MP4
                onlineVideo.style.display = 'block';
                offlineVideo.style.display = 'none';
            } else {
                // لو مفيش نت: اخفي Wistia وشغل الـ MP4 المحلي
                onlineVideo.style.display = 'none';
                offlineVideo.style.display = 'block';
            }
        }

        // بيشيك أول ما الصفحة تفتح
        window.addEventListener('load', checkInternet);

        window.addEventListener('online', checkInternet);
        window.addEventListener('offline', checkInternet);
