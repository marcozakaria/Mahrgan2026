<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع بطاركة كرسي الإسكندرية الـ 50</title>
    <style>
        :root {
            --primary-color: #8b6508;
            --secondary-color: #1a1a1a;
            --bg-color: #f9f6f0;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--primary-color);
            font-size: 2.3rem;
            margin-bottom: 10px;
        }
        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: 0.3s;
            display: block;
            margin: 0 auto 20px auto;
        }
        .search-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(139, 101, 8, 0.2);
        }
        
        /* تصميم أزرار التنقل */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }
        .page-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            min-width: 100px;
        }
        .page-btn:hover:not(:disabled) {
            background-color: #6d4f05;
        }
        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .page-info {
            font-size: 16px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            min-height: 400px; /* يحافظ على مساحة العرض */
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .badge {
            background-color: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: var(--secondary-color);
            font-size: 1.3rem;
        }
        .era {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-style: italic;
        }
        .note {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 18px;
            color: #888;
            padding: 40px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>تاريخ بطاركة الكنيسة القبطية</h1>
        <p>عرض تفاعلي مقسم على 4 صفحات لأول 50 بطريركاً</p>
    </header>

    <!-- خانة البحث التفاعلي -->
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث باسم البطريرك أو القرن أو الحدث التاريخي...">

    <!-- أزرار التنقل العلوية (فوق) -->
    <div class="pagination-container">
        <button class="page-btn prevBtn" onclick="changePage(-1)">السابق</button>
        <span class="page-info pageInfoDisplay">صفحة 1 من 4</span>
        <button class="page-btn nextBtn" onclick="changePage(1)">التالي</button>
    </div>

    <!-- شبكة عرض البطاركة -->
    <div class="grid" id="popesGrid"></div>

    <!-- أزرار التنقل السفلية (تحت) -->
    <div class="pagination-container" style="margin-top: 40px;">
        <button class="page-btn prevBtn" onclick="changePage(-1)">السابق</button>
        <span class="page-info pageInfoDisplay">صفحة 1 من 4</span>
        <button class="page-btn nextBtn" onclick="changePage(1)">التالي</button>
    </div>
</div>

<script>
    // مصفوفة البيانات الكاملة لـ 50 بطريركاً
    const popesData = [
        { "number": 1, "name": "القديس مرقس الرسول", "era": "القرن 1 م", "note": "كاروز الديار المصرية ومؤسس الكرسي الإسكندري." },
        { "number": 2, "name": "البابا إنيانوس", "era": "القرن 1 م", "note": "أول من آمن بالمارقسية في الإسكندرية وكان إسكافياً." },
        { "number": 3, "name": "البابا ميليوس", "era": "القرن 1 - 2 م", "note": "رسمه القديس لوقا البشير واستمرت حبريته بافتقاد شعبه." },
        { "number": 4, "name": "البابا كردونوس", "era": "القرن 2 م", "note": "عمد على يد مارمرقس الرسول وعاصر الشدائد الأولى للوثنيين." },
        { "number": 5, "name": "البابا إبريموس", "era": "القرن 2 م", "note": "شهد عهده نمواً كبيراً للمسيحية وانتشاراً في ربوع الإسكندرية." },
        { "number": 6, "name": "البابا يسطس", "era": "القرن 2 م", "note": "كان عميداً للمدرسة اللاهوتية بالإسكندرية قبل سيامته." },
        { "number": 7, "name": "البابا أومانيوس", "era": "القرن 2 م", "note": "تولى إدارة المدرسة اللاهوتية وسلك بسيرة صالحة." },
        { "number": 8, "name": "البابا مركيانوس", "era": "القرن 2 م", "note": "تميز عهده بالهدوء النسبي من الاضطهادات الرومانية." },
        { "number": 9, "name": "البابا كلاديانوس", "era": "القرن 2 م", "note": "استمر في نشر التعليم والوعظ وتثبيت المؤمنين." },
        { "number": 10, "name": "البابا أغريبينوس", "era": "القرن 2 م", "note": "عاش حياة زهد ونسك شديدة ولم يقتنِ فضة ولا ذهباً." },
        { "number": 11, "name": "البابا يوليانوس", "era": "القرن 2 م", "note": "أول من رسم أساقفة خارج الإسكندرية لرعاية الأقاليم." },
        { "number": 12, "name": "البابا ديمتريوس الكرام", "era": "القرن 2 - 3 م", "note": "مُقنن حساب الأبقطي لتحديد موعد عيد القيامة العالمي." },
        { "number": 13, "name": "البابا ياروكلاس", "era": "القرن 3 م", "note": "تلميذ العلامة أوريجانوس واشتهر بقوة تعليمه وفلسفته." },
        { "number": 14, "name": "البابا ديونيسيوس", "era": "القرن 3 م", "note": "لقب بـ 'معلم الكنيسة الجامعة' لكثرة رسائله الرعوية اللاهوتية." },
        { "number": 15, "name": "البابا مكسيموس", "era": "القرن 3 م", "note": "عاصر اضطهاد الإمبراطور ديوكلتيانوس في بداياته وثبّت الشعب." },
        { "number": 16, "name": "البابا ثيؤناس", "era": "القرن 3 - 4 م", "note": "بنى أول كنيسة نظامية في الإسكندرية باسم العذراء مريم." },
        { "number": 17, "name": "البابا بطرس الأول", "era": "القرن 4 م", "note": "لقب بـ 'خاتم الشهداء' لتنفيذ حكم إعدامه بآخر عهد ديوكلتيانوس." },
        { "number": 18, "name": "البابا أرشيلاوس", "era": "القرن 4 م", "note": "جلس على الكرسي شهوراً قليلة فقط وتنيّح بسلام." },
        { "number": 19, "name": "البابا ألكسندروس الأول", "era": "القرن 4 م", "note": "حضر مجمع نيقية المسكوني الأول عام 325 م لمواجهة البدعة الأريوسية." },
        { "number": 20, "name": "البابا أثناسيوس الرسولي", "era": "القرن 4 م", "note": "حامي الإيمان وبطل مجمع نيقية ونُفي عن كرسيه 5 مرات." },
        { "number": 21, "name": "البابا بطرس الثاني", "era": "القرن 4 م", "note": "خلف أثناسيوس وعانى من اضطهاد شديد من قِبل الأريوسيين." },
        { "number": 22, "name": "البابا تيموثاوس الأول", "era": "القرن 4 م", "note": "حضر مجمع القسطنطينية المسكوني عام 381 م لدحض بدعة مقدونيوس." },
        { "number": 23, "name": "البابا ثاوفيلس", "era": "القرن 4 - 5 م", "note": "شهد عهده تحويل المعابد الوثنية إلى كنائس ونهاية الوثنية رسمياً." },
        { "number": 24, "name": "البابا كيرلس الأول", "era": "القرن 5 م", "note": "لقب بـ 'عمود الدين'، وبطل مجمع أفسس المسكوني عام 431 م." },
        { "number": 25, "name": "البابا ديسقوروس الأول", "era": "القرن 5 م", "note": "بطل مجمع مجمع خلقيدونية ونُفي إلى جزيرة غانغرا دفاعاً عن الإيمان." },
        { "number": 26, "name": "البابا تيموثاوس الثاني", "era": "القرن 5 م", "note": "الملقب بـ 'تيموثاوس الأورورس' وعانى النفي والاضطهاد البيزنطي." },
        { "number": 27, "name": "البابا بطرس الثالث", "era": "القرن 5 م", "note": "الملقب بـ 'بطرس منغوس' وصاحب وثيقة الهينوتيكون للاتحاد." },
        { "number": 28, "name": "البابا أثناسيوس الثاني", "era": "القرن 5 م", "note": "شهد عهده هدوءاً نسبياً واستقراراً رعوياً لكنائس مصر." },
        { "number": 29, "name": "البابا يوحنا الأول", "era": "القرن 5 - 6 م", "note": "أول بابا يلقب بالرهاوي وعاش حياة زهد ونسك رهباني صارم." },
        { "number": 30, "name": "البابا يوحنا الثاني", "era": "القرن 6 م", "note": "استمر في تثبيت العقيدة الأرثوذكسية وتدبير شؤون الأديرة." },
        { "number": 31, "name": "البابا ثيؤدوسيوس الأول", "era": "القرن 6 م", "note": "آخر بطريرك اعترفت به السلطة البيزنطية الملكانية قبل نفيه." },
        { "number": 32, "name": "البابا بطرس الرابع", "era": "القرن 6 م", "note": "أقام مجبراً في دير الزجاج بسبب الاضطهاد والقبضة البيزنطية." },
        { "number": 33, "name": "البابا داميانو", "era": "القرن 6 م", "note": "كتب رسائل لاهوتية ومقالات هامة لتفنيد بدع زمانه." },
        { "number": 34, "name": "البابا أناستاسيوس", "era": "القرن 6 - 7 م", "note": "نجح في استعادة عدة كنائس كانت مغتصبة بذكاء وحكمة وحزم." },
        { "number": 35, "name": "البابا أندرونيقوس", "era": "القرن 7 م", "note": "عاصر الغلو والاجتياح الفارسي العنيف لأرض مصر وتألم مع رعيته." },
        { "number": 36, "name": "البابا بنيامين الأول", "era": "القرن 7 م", "note": "عاصر الفتح الإسلامي لمصر وعاد لكرسيه بأمان بعهد عمرو بن العاص." },
        { "number": 37, "name": "البابا أغاثون", "era": "القرن 7 م", "note": "تلميذ البابا بنيامين المخلص وساعده في إعادة إعمار الكنائس المدمرة." },
        { "number": 38, "name": "البابا يوحنا الثالث", "era": "القرن 7 م", "note": "اهتم برعاية الفقراء وبناء المنشآت الكنسية والخدمية." },
        { "number": 39, "name": "البابا إسحق", "era": "القرن 7 م", "note": "كان كاتباً ماهراً قبل سيامته واشتهر بحكمته السياسية والدينية." },
        { "number": 40, "name": "البابا سيمون الأول", "era": "القرن 7 - 8 م", "note": "كان سرياني الجنسية وامتاز بالتقوى الشديدة ومحبة الجميع." },
        { "number": 41, "name": "البابا ألكسندروس الثاني", "era": "القرن 8 م", "note": "تحمل شدائد وضغوطاً مالية كبيرة لتدبير الالتزامات الكنسية." },
        { "number": 42, "name": "البابا كوزماس الأول", "era": "القرن 8 م", "note": "تميزت فترة حبريته بالسلام والهدوء والنمو الروحي للشعب." },
        { "number": 43, "name": "البابا تيموثاوس الثالث", "era": "القرن 8 م", "note": "اهتم بالتعليم والوعظ وتفقد الأديرة النائية ورعاية الرهبان." },
        { "number": 44, "name": "البابا ميخائيل الأول", "era": "القرن 8 م", "note": "سُجن واحتمل مشقات كثيرة دفاعاً عن حقوق ومكتسبات رعيته." },
        { "number": 45, "name": "البابا مينا الأول", "era": "القرن 8 م", "note": "كان راهباً فاضلاً في دير القديس مقاريوس الكبير قبل اختياره." },
        { "number": 46, "name": "البابا يوحنا الرابع", "era": "القرن 8 م", "note": "اشتهر بالرحمة والتدبير الحسن والعطاء الواسع للفقراء والمحتاجين." },
        { "number": 47, "name": "البابا مرقس الثاني", "era": "القرن 8 - 9 م", "note": "عمر دير السريان العامر ووحد بعض الجماعات المنشقة بالحوار." },
        { "number": 48, "name": "البابا يعقوب", "era": "القرن 9 م", "note": "عقد مجمعاً لتثبيت السلام الكنسي وقام بزيارات رعوية لأديرة الصعيد." },
        { "number": 49, "name": "البابا سيمون الثاني", "era": "القرن 9 م", "note": "قضى في الحبرية خمسة أشهر ونصف فقط وتنيح سريعاً بسلام." },
        { "number": 50, "name": "البابا يوساب الأول", "era": "القرن 9 م", "note": "شهد عهده حركات تجديد معمارية واسعة للكنائس الأثرية القديمة." }
    ];

    // إعدادات تقسيم الصفحات (Pagination)
    let currentPage = 1;
    const itemsPerPage = 13; // 50 بطريركاً مقسمين على 4 صفحات (13 + 13 + 13 + 11)
    let currentFilteredData = [...popesData]; // لحفظ نتائج البحث

    const grid = document.getElementById('popesGrid');
    const searchInput = document.getElementById('searchInput');
    
    // جلب عناصر الأزرار والنصوص (العلوية والسفلية معاً)
    const prevButtons = document.querySelectorAll('.prevBtn');
    const nextButtons = document.querySelectorAll('.nextBtn');
    const pageInfoDisplays = document.querySelectorAll('.pageInfoDisplay');

    // دالة تحديث وعرض الصفحة الحالية
    function renderPage() {
        grid.innerHTML = '';
        
        if (currentFilteredData.length === 0) {
            grid.innerHTML = '<div class="no-results">لم يتم العثور على نتائج تطابق بحثك!</div>';
            updateControls(0, 0);
            return;
        }

        // حساب إجمالي عدد الصفحات بناءً على البيانات الحالية
        const totalPages = Math.ceil(currentFilteredData.length / itemsPerPage);
        
        // التأكد من أن الصفحة الحالية لا تتخطى الإجمالي عند البحث
        if (currentPage > totalPages) currentPage = totalPages || 1;

        // تحديد بداية ونهاية عناصر الصفحة الحالية
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageItems = currentFilteredData.slice(startIndex, endIndex);

        // إنشاء بطاقات العرض
        pageItems.forEach(pope => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="badge">رقم ${pope.number}</span>
                <h3>${pope.name}</h3>
                <div class="era">${pope.era}</div>
                <div class="note">${pope.note}</div>
            `;
            grid.appendChild(card);
        });

        // تحديث حالة الأزرار ونصوص الصفحات فوق وتحت
        updateControls(currentPage, totalPages);
    }

    // دالة لتحديث حالة عناصر التحكم (فوق وتحت) في نفس الوقت
    function updateControls(current, total) {
        pageInfoDisplays.forEach(display => {
            display.textContent = total === 0 ? "صفحة 0 من 0" : `صفحة ${current} من ${total}`;
        });

        prevButtons.forEach(btn => {
            btn.disabled = current <= 1;
        });

        nextButtons.forEach(btn => {
            btn.disabled = current >= total || total === 0;
        });
    }

    // دالة تغيير الصفحة عند الضغط على الأزرار
    function changePage(direction) {
        currentPage += direction;
        renderPage();
        // تمرير الشاشة لأعلى الصفحة بسلاسة عند الانتقال بين الصفحات من الأسفل
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // تفعيل البحث التفاعلي الفوري وإعادة ضبط الصفحات
    searchInput.addEventListener('input', (e) => {
        const text = e.target.value.toLowerCase().trim();
        
        currentFilteredData = popesData.filter(pope => 
            pope.name.toLowerCase().includes(text) || 
            pope.note.toLowerCase().includes(text) ||
            pope.era.toLowerCase().includes(text)
        );
        
        currentPage = 1; // تصفير العداد ليعود للصفحة الأولى عند كل بحث جديد
        renderPage();
    });

    // التشغيل الأولي للموقع
    renderPage();
</script>

</body>
</html>
